<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - POS System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

    <!-- Tab-superior -->
    <ul class="nav nav-tabs mb-4 justify-content-between">
        <div class="d-flex">
            <li class="nav-item">
                <a class="nav-link" href="index.html">Tienda</a>
            </li>
        </div>

        <div class="d-flex">
            <li class="nav-item">
                <a class="nav-link" href="cuenta.html">
                    <i class="bi bi-person"></i> Cuenta
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="carrito.html">
                    <i class="bi bi-cart"></i> Carrito
                    <span id="carritoCount" class="badge bg-danger">0</span>
                </a>
            </li>
        </div>
    </ul>

    <h1 class="mb-4 text-center">Carrito de Compras 🛒</h1>
    
    <!-- Mensaje cuando el carrito está vacío -->
    <div id="carritoVacio" class="alert alert-info text-center" style="display: none;">
        <i class="bi bi-cart-x fs-1"></i>
        <p class="mt-2">Tu carrito está vacío</p>
        <a href="index.html" class="btn btn-primary">Ir a la tienda</a>
    </div>
    
    <!-- Tabla de productos en el carrito -->
    <div id="carritoContenido" class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCarrito">
                <!-- Los productos del carrito se cargan aca -->
            </tbody>
        </table>
    </div>
    
    <!-- Total -->
    <div id="totalContainer" class="d-flex justify-content-end mt-3">
        <h4>Total: $<span id="totalCarrito">0</span></h4>
    </div>
    
    <!-- Botones -->
    <div id="botonesContainer" class="mt-4 d-flex justify-content-end gap-2">
        <a href="index.html" class="btn btn-secondary">Seguir comprando</a>
        <button class="btn btn-danger" onclick="vaciarCarrito()">Vaciar carrito</button>
        <button class="btn btn-success" onclick="finalizarCompra()">Finalizar compra</button>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="carrito.js"></script>

</body>
</html>
