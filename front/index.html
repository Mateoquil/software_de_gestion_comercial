<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - POS System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container mt-4">
    
        <!-- Tab-superior -->
        <ul class="nav nav-tabs mb-4 justify-content-between">
            <!-- Bloque-izq. -->
            <div class="d-flex">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Tienda</a>
                </li>
            </div>

            <!-- Bloque-der. -->
            <div class="d-flex">
                <li class="nav-item">
                    <a class="nav-link" href="cuenta.html">
                        <i class="bi bi-person"></i> Cuenta
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="carrito.html">
                        <i class="bi bi-cart"></i> Carrito
                    </a>
                </li>
            </div>
        </ul>

        <h1 class="mb-4">Tienda</h1>
        
        <!-- Buscador -->
        <div class="row mb-3">
            <div class="col-md-4 mb-2">
                <label for="nombreProducto" class="form-label">Nombre</label>
                <input 
                    type="text"
                    class="form-control" 
                    id="nombreProducto"
                    placeholder="Ingrese el nombre del producto"
                >
            </div>
            
            <!-- <div class="col-md-4 mb-2">
                <label for="tipoProducto" class="form-label">Tipo de Producto</label>
                <select class="form-select" id="tipoProducto">
                    <option value="">Seleccione tipo</option>
                    <option value="Alimentos">Alimentos</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="gaseosas">Gaseosas</option>
                </select>
            </div> -->
            
            <div class="col-md-4 mb-2 d-flex align-items-end gap-2">
                <button class="btn btn-success" onclick="buscarProductos()">
                    <i class="bi bi-search"></i> Buscar
                </button>
            </div>
        </div>
        
        <!-- Tabla productos -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre del producto</th>
                        <th>Etiqueta</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablePadre">
                    <!-- Los productos se cargan dinámicamente del JS -->
                </tbody>
            </table>
        </div>
        
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!--Nuetro JS perzonalizado -->
    <script src="main.js"></script>
    
</body>
</html>
