<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - POS System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <<link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container mt-4">
    
        <!-- Tabs superior -->
        <ul class="nav nav-tabs mb-4 justify-content-between">
            <div class="d-flex">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Tienda</a>
                </li>
            </div>

            <div class="d-flex">
                <li class="nav-item">
                    <a class="nav-link" href="cuenta.html">
                        <i class="bi bi-person"></i> Cuenta
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="carrito.html">
                        <i class="bi bi-cart"></i> Carrito
                        <span id="carritoCount" class="badge bg-danger" style="display: none;">0</span>
                    </a>
                </li>
            </div>
        </ul>

        <h1 class="mb-4">Tienda</h1>
        
        <!-- Buscador (solo nombre) -->
        <div class="row mb-4">
            <div class="col-md-12">
                <label for="nombreProducto" class="form-label">Buscar Producto</label>
                <div class="input-group">
                    <input 
                        type="text"
                        class="form-control" 
                        id="nombreProducto"
                        placeholder="Busque su producto aquí..."
                        list="sugerencias"
                    >
                    <button class="btn btn-success" onclick="buscarProductos()">
                        <i class="bi bi-search"></i> Buscar
                    </button>
                    <button class="btn btn-secondary" onclick="limpiarBusqueda()">
                        <i class="bi bi-x-circle"></i> Limpiar
                    </button>
                </div>
                <datalist id="sugerencias"></datalist>
            </div>
        </div>
        
        <!-- Tabla productos -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre del producto</th>
                        <th>Etiqueta</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablePadre">
                    <!-- Los productos se cargan dinámicamente -->
                </tbody>
            </table>
        </div>
        
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Tu JS -->
    <script src="main.js"></script>
    
</body>
</html>
