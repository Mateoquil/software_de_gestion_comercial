<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado - POS System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container mt-4">
    
<!-- Tab-izq. -->
    <ul class="nav nav-tabs mb-4 justify-content-between">
    <!-- Bloque izquierdo -->
    <div class="d-flex">
    <li class="nav-item">
        <a class="nav-link active" href="index.html">Tienda</a>
    </li>
    </div>

<!-- tab-der.-->
    <div class="d-flex">
    <li class="nav-item">
    <a class="nav-link" href="cuenta.html">
        <i class="bi bi-person"></i> Cuenta
    </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="carrito.html">
        <i class="bi bi-cart"></i> Carrito
    </a>
    </li>
    </div>
</ul>


        
        <h1 class="mb-4">Supermercado</h1>
        
        <div class="row mb-3">
            <div class="col-md-4 mb-2">
                <label for="nombreProducto" class="form-label">Nombre</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="nombreProducto"
                    placeholder="Ingrese el nombre del producto"
                >
            </div>
            
            <div class="col-md-4 mb-2">
                <label for="tipoProducto" class="form-label">Tipo de Producto</label>
                <select class="form-select" id="tipoProducto">
                    <option value="">Seleccione tipo</option>
                    <option value="alimentos">Alimentos</option>
                    <option value="golosinas">Golosinas</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="limpieza">Limpieza</option>
                    <option value="otros">Otros</option>
                </select>
            </div>
            
            <div class="col-md-4 mb-2 d-flex align-items-end gap-2">
                <button class="btn btn-success me-2">
                    <i class="bi bi-search"></i> Buscar
                </button>
                <button class="btn btn-secondary">
                    <i class="bi bi-download"></i> Exportar
                </button>
            </div>
        </div>
        
        <div class="mb-3">
            <button class="btn btn-success me-2">Comprar</button>
            <button class="btn btn-sm btn-danger">Cancelar</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre del producto</th>
                        <th>Etiqueta</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Yogur</td>
                        <td><span class="badge bg-primary">Alimentos</span></td>
                        <td>$</td>
                        <td>15</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Fanta</td>
                        <td><span class="badge bg-secondary">Bebidas</span></td>
                        <td>$</td>
                        <td>8</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Fideos</td>
                        <td><span class="badge bg-primary">Alimentos</span></td>
                        <td>$</td>
                        <td>12</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Coca-Cola</td>
                        <td><span class="badge bg-secondary">Bebidas</span></td>
                        <td>$</td>
                        <td>20</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Arroz</td>
                        <td><span class="badge bg-primary">Alimentos</span></td>
                        <td>$</td>
                        <td>25</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Leche</td>
                        <td><span class="badge bg-secondary">Bebidas</span></td>
                        <td>$</td>
                        <td>5</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1">Comprar</button>
                            <button class="btn btn-sm btn-danger">Cancelar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!--<script src="index.js"></script>-->
</body>
</html>
