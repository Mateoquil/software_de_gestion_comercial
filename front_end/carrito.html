<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado - POS System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

<!-- Tab-izq. -->
<ul class="nav nav-tabs mb-4 justify-content-between">
    <!-- Bloque izquierdo -->
    <div class="d-flex">
    <li class="nav-item">
        <a class="nav-link active" href="index.html">Tienda</a>
    </li>
</div>

<!-- tab-der.-->
<div class="d-flex">
    <li class="nav-item">
    <a class="nav-link" href="cuenta.html">
        <i class="bi bi-person"></i> Cuenta
    </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="carrito.html">
        <i class="bi bi-cart"></i> Carrito
    </a>
    </li>
    </div>
</ul>

    <h1 class="mb-4 text-center"> Carrito de Compras 🛒</h1>
    
    <!-- Tabla de productos en el carrito -->
    <div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <!--aca van los productos del carrito-->
        </tbody>
    </table>
    </div>
    
    <!--hacer que los productos juntados en el carrito hagan suma del total que se tiene que gastar -->
    <div class="d-flex justify-content-end mt-3">
    <h4></h4>
    </div>
    
    <!-- Botones de acción -->
    <div class="mt-4 d-flex justify-content-end gap-2">
    <button class="btn btn-secondary">Seguir comprando</button>
    <button class="btn btn-success">Finalizar compra</button>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
